document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nk-mute); font-weight: 400;\n  }\n\n  .container { max-width: 820px; margin: 0 auto; padding: 56px 24px 90px; }\n\n  .page-title { margin-bottom: 40px; }\n  .page-title .eyebrow {\n    font-size: 12px; letter-spacing: 0.36em; text-transform: uppercase;\n    color: var(--sage); margin-bottom: 14px; font-weight: 400;\n  }\n  .page-title h1 {\n    font-family: 'Cormorant Garamond', Georgia, serif;\n    font-size: 64px; font-weight: 400; line-height: 1.0;\n    letter-spacing: 0.01em; color: var(--ink);\n  }\n\n  .tabs {\n    display: flex; border: 1px solid var(--line-strong);\n    border-radius: var(--radius); overflow: hidden;\n    width: fit-content; margin-bottom: 40px;\n  }\n  .tab {\n    padding: 12px 28px; font-family: 'Inter', sans-serif;\n    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;\n    cursor: pointer; color: var(--ink-dim); background: transparent;\n    border: none; transition: background 0.18s, color 0.18s; font-weight: 400;\n    white-space: nowrap;\n  }\n  .tab.active { background: var(--sage); color: var(--bg); font-weight: 500; }\n\n  .sec-label {\n    font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;\n    color: var(--sage-mute); padding-bottom: 12px;\n    border-bottom: 1px solid var(--line); margin-bottom: 18px; font-weight: 400;\n  }\n\n  .checks { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }\n  .check-row {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 18px 22px; border: 1px solid var(--line);\n    border-radius: var(--radius); cursor: pointer; user-select: none;\n    transition: background 0.14s, border-color 0.14s;\n  }\n  .check-row:hover { background: var(--bg-2); }\n  .check-row.selected { border-color: var(--sage); background: rgba(154,167,132,0.07); }\n  .check-left { display: flex; align-items: center; gap: 16px; }\n  .check-box {\n    width: 20px; height: 20px; border: 1px solid var(--ink-mute);\n    border-radius: 2px; display: flex; align-items: center; justify-content: center;\n    flex-shrink: 0; font-size: 13px; color: var(--bg);\n    transition: background 0.14s, border-color 0.14s;\n  }\n  .check-box.on { background: var(--sage); border-color: var(--sage); }\n  .check-name { font-size: 16px; color: var(--ink); font-weight: 400; }\n  .check-desc { font-size: 13px; color: var(--ink-mute); margin-top: 3px; }\n  .check-price { font-size: 15px; color: var(--ink); font-weight: 400; }\n\n  .table-wrap { margin-bottom: 36px; overflow-x: auto; }\n  table { width: 100%; border-collapse: collapse; font-size: 15px; }\n  th {\n    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--sage-mute); padding: 12px 12px; border-bottom: 1px solid var(--line-strong);\n    font-weight: 400; text-align: left;\n  }\n  th.r, td.r { text-align: right; }\n  td { padding: 13px 12px; border-bottom: 1px solid var(--line); color: var(--ink-dim); }\n  tr.entrega-row td { background: var(--bg-3); font-weight: 500; color: var(--ink); }\n  .cuota-input {\n    width: 100%; border: none; background: transparent; font-size: 15px;\n    text-align: right; color: var(--ink); font-family: 'Inter', sans-serif;\n    font-variant-numeric: tabular-nums; padding: 0; outline: none; cursor: pointer; font-weight: 400;\n  }\n  .cuota-input:focus { background: rgba(154,167,132,0.10); border-radius: 2px; padding: 4px 6px; color: var(--sage); }\n  .cuota-input.bajo { color: var(--warn); }\n\n  .cuotas-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }\n  .reset-btn {\n    font-size: 12px; padding: 8px 18px; border: 1px solid var(--line-strong);\n    border-radius: var(--radius); background: transparent; cursor: pointer;\n    color: var(--ink-dim); font-family: 'Inter', sans-serif; letter-spacing: 0.08em;\n    text-transform: uppercase; transition: background 0.14s, color 0.14s;\n  }\n  .reset-btn:hover { background: var(--bg-2); color: var(--ink); }\n\n  .cotizacion {\n    border: 1px solid var(--line); border-radius: var(--radius-lg);\n    overflow: hidden; margin-top: 10px; background: var(--bg-2);\n  }\n  .cot-header { padding: 22px 26px; border-bottom: 1px solid var(--line); background: var(--bg-3); }\n  .cot-eyebrow {\n    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;\n    color: var(--sage); margin-bottom: 6px; font-weight: 400;\n  }\n  .cot-header h2 {\n    font-family: 'Cormorant Garamond', Georgia, serif;\n    font-size: 32px; font-weight: 400; color: var(--ink); letter-spacing: 0.01em;\n  }\n  .cot-row {\n    display: flex; justify-content: space-between; align-items: center;\n    padding: 15px 26px; border-bottom: 1px solid var(--line);\n  }\n  .cot-row:last-child { border-bottom: none; }\n  .cot-row.sub { padding-left: 46px; }\n  .cot-row.divider { border-top: 1px solid var(--line-strong); }\n  .cot-row.total { background: var(--sage); }\n  .cot-label { font-size: 15px; color: var(--ink); font-weight: 400; }\n  .cot-label.muted { color: var(--ink-mute); font-size: 14px; }\n  .cot-val { font-size: 15px; color: var(--ink); font-weight: 400; }\n  .cot-val.muted { color: var(--ink-mute); font-size: 14px; }\n  .cot-row.total .cot-label, .cot-row.total .cot-val { color: var(--bg); font-weight: 600; }\n  .cot-row.total .cot-label { letter-spacing: 0.04em; text-transform: uppercase; font-size: 14px; }\n  .cot-row.total .cot-val { font-size: 19px; }\n  .cot-row.cf .cot-label { color: var(--warn); font-size: 14px; }\n  .cot-row.cf .cot-val { color: var(--warn); font-size: 14px; }\n\n  .tl {\n    display: flex; height: 42px; border-radius: var(--radius);\n    overflow: hidden; margin-bottom: 36px; border: 1px solid var(--line);\n  }\n  .tl-a {\n    display: flex; align-items: center; justify-content: center;\n    background: var(--sage); color: var(--bg); font-size: 12px;\n    letter-spacing: 0.08em; padding: 0 18px; white-space: nowrap; font-weight: 500;\n  }\n  .tl-b {\n    display: flex; align-items: center; justify-content: center; flex: 1;\n    background: var(--bg-2); color: var(--ink-dim); font-size: 12px;\n    letter-spacing: 0.06em; border-left: 1px solid var(--line); border-right: 1px solid var(--line);\n  }\n\n  .note {\n    font-size: 13px; color: var(--ink-mute); margin-top: 26px; line-height: 1.75;\n    border-left: 2px solid var(--sage); padding-left: 16px; font-weight: 300;\n  }\n\n  #saldo-banner {\n    margin-bottom: 14px; padding: 14px 20px; border: 1px solid var(--line);\n    border-radius: var(--radius); background: var(--bg-2);\n    justify-content: space-between; align-items: center;\n  }\n  #saldo-banner span:first-child {\n    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute);\n  }\n  #saldo-val { font-size: 18px; color: var(--sage); font-weight: 400; }\n\n  .site-footer {\n    border-top: 1px solid var(--line); padding: 26px 36px;\n    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;\n    color: var(--ink-mute); display: flex; justify-content: space-between;\n    align-items: center; margin-top: 56px; gap: 24px;\n  }\n  .site-footer .logos { display: flex; align-items: center; gap: 22px; }\n  .site-footer .logos img { height: 18px; width: auto; opacity: 0.5; }\n  .site-footer .logos .sep { width: 1px; height: 12px; background: var(--line-strong); }\n\n  @media (max-width: 600px) {\n    .site-header { padding: 18px 20px; }\n    .container { padding: 36px 16px 64px; }\n    .page-title h1 { font-size: 46px; }\n    .cot-row.sub { padding-left: 26px; }\n    .site-footer { flex-direction: column; align-items: flex-start; gap: 16px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"site-header\">\n  <div class=\"logo\">Montañuela<\u002Fdiv>\n  <div class=\"sub\">Guarne · Antioquia<\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"container\">\n  <div class=\"page-title\">\n    <div class=\"eyebrow\">Plan de pagos<\u002Fdiv>\n    <h1>Cotizador<\u002Fh1>\n  <\u002Fdiv>\n\n  <div class=\"tabs\">\n    <button class=\"tab active\" id=\"tab-est\" onclick=\"setTab('est')\">Plan estándar<\u002Fbutton>\n    <button class=\"tab\" id=\"tab-sim\" onclick=\"setTab('sim')\">Simulador<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"pane-est\">\n    <p class=\"sec-label\">Selecciona tu unidad<\u002Fp>\n    <div class=\"checks\">\n      <div class=\"check-row\" onclick=\"toggleAdic('est','premium')\" id=\"est-premium\">\n        <div class=\"check-left\">\n          <div class=\"check-box\" id=\"est-premium-box\"><\u002Fdiv>\n          <div><div class=\"check-name\">Paquete premium<\u002Fdiv><div class=\"check-desc\">Acabados y especificaciones superiores<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"check-price\">+ $100.000.000<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"check-row\" onclick=\"toggleAdic('est','hab3')\" id=\"est-hab3\">\n        <div class=\"check-left\">\n          <div class=\"check-box\" id=\"est-hab3-box\"><\u002Fdiv>\n          <div><div class=\"check-name\">Tercera habitación<\u002Fdiv><div class=\"check-desc\">Habitación adicional con baño<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"check-price\">+ $100.000.000<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl\">\n      <div class=\"tl-a\">10% · Separación<\u002Fdiv>\n      <div class=\"tl-b\">Meses 1–24 · 80% en cuotas iguales<\u002Fdiv>\n      <div class=\"tl-a\">10% · Entrega<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cotizacion\" id=\"cot-est\"><\u002Fdiv>\n    <p class=\"note\">Plan base sin costo financiero. La separación se paga al momento de la reserva, 24 cuotas iguales durante el proyecto y el saldo en escrituración.<\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"pane-sim\" style=\"display:none;\">\n    <p class=\"sec-label\">Selecciona tu unidad<\u002Fp>\n    <div class=\"checks\">\n      <div class=\"check-row\" onclick=\"toggleAdic('sim','premium')\" id=\"sim-premium\">\n        <div class=\"check-left\">\n          <div class=\"check-box\" id=\"sim-premium-box\"><\u002Fdiv>\n          <div><div class=\"check-name\">Paquete premium<\u002Fdiv><div class=\"check-desc\">Acabados y especificaciones superiores<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"check-price\">+ $100.000.000<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"check-row\" onclick=\"toggleAdic('sim','hab3')\" id=\"sim-hab3\">\n        <div class=\"check-left\">\n          <div class=\"check-box\" id=\"sim-hab3-box\"><\u002Fdiv>\n          <div><div class=\"check-name\">Tercera habitación<\u002Fdiv><div class=\"check-desc\">Habitación adicional con baño<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"check-price\">+ $100.000.000<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cuotas-header\">\n      <p class=\"sec-label\" style=\"margin-bottom:0;border:none;padding-bottom:0;\">Cuotas mensuales — edita cualquier valor<\u002Fp>\n      <button class=\"reset-btn\" onclick=\"resetCuotas()\">↺ Restablecer<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div id=\"saldo-banner\" style=\"display:none;\">\n      <span>Por distribuir en cuotas vacías<\u002Fspan>\n      <span id=\"saldo-val\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"table-wrap\">\n      <table>\n        <thead>\n          <tr>\n            <th>Mes<\u002Fth>\n            <th class=\"r\">Cuota<\u002Fth>\n            <th class=\"r\">Estándar<\u002Fth>\n            <th class=\"r\">Pagado acum.<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"tbody-sim\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"cotizacion\" id=\"cot-sim\"><\u002Fdiv>\n    <p class=\"note\" id=\"nota-sim\">El costo financiero solo aparece cuando tu plan genera mayor costo para Futura que el estándar. Si adelantas pagos en algunos meses, eso compensa meses donde pagues menos.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<footer class=\"site-footer\">\n  <span>Montañuela®<\u002Fspan>\n  <div class=\"logos\">\n    <img src=\"f9435b06-7151-4e4e-831a-e52e7e204fa8\" alt=\"Compose\">\n    <span class=\"sep\"><\u002Fspan>\n    <img src=\"34554438-80a8-44b5-98a1-007234c8c0ca\" alt=\"revive\">\n    <span class=\"sep\"><\u002Fspan>\n    <img src=\"8a88c833-dcfc-4918-9888-2b3ca70bc890\" alt=\"Urii\">\n  <\u002Fdiv>\n  <span>Guarne, Antioquia<\u002Fspan>\n<\u002Ffooter>\n\n<script>\nconst TASA = 0.018;\nconst UMBRAL = 1000;\nconst BASE = 899000000;\nconst PREMIUM = 100000000;\nconst HAB3 = 100000000;\n\nlet estado = { est:{premium:false,hab3:false}, sim:{premium:false,hab3:false} };\nlet cuotasCustom = [];\n\nfunction fmt(n){ return '$'+Math.round(n).toLocaleString('es-CO'); }\nfunction getPrecio(tab){ return BASE+(estado[tab].premium?PREMIUM:0)+(estado[tab].hab3?HAB3:0); }\n\nfunction getCuotasEst(p){\n  const base80 = p * 0.80;\n  const c = Math.floor(base80 / 24);\n  const arr = Array(24).fill(c);\n  arr[23] = base80 - c * 23;\n  return arr;\n}\n\nfunction initCuotas(){\n  cuotasCustom = getCuotasEst(getPrecio('sim')).slice();\n}\n\nfunction toggleAdic(tab, key){\n  estado[tab][key] = !estado[tab][key];\n  const box = document.getElementById(tab+'-'+key+'-box');\n  const row = document.getElementById(tab+'-'+key);\n  if(estado[tab][key]){\n    box.classList.add('on'); box.innerHTML='✓'; row.classList.add('selected');\n  } else {\n    box.classList.remove('on'); box.innerHTML=''; row.classList.remove('selected');\n  }\n  if(tab==='est') renderEst(); else { initCuotas(); renderSim(); }\n}\n\n// CF = VF(est) - VF(cli) al mes 25, solo si positivo\nfunction calcCF(cuotasEst, cuotasCli){\n  let vfEst = 0, vfCli = 0;\n  for(let i=0; i<24; i++){\n    const factor = Math.pow(1 + TASA, 25 - (i+1));\n    vfEst += cuotasEst[i] * factor;\n    vfCli += cuotasCli[i] * factor;\n  }\n  return { vfEst, vfCli, cf: Math.max(0, vfEst - vfCli) };\n}\n\nfunction calcSim(){\n  const p = getPrecio('sim');\n  const cuotasEst = getCuotasEst(p);\n  const base80 = p * 0.80;\n  const rows = [];\n  let pagadoAcum = 0;\n\n  for(let i=0; i<24; i++){\n    pagadoAcum += cuotasCustom[i];\n    const disponible = base80 - pagadoAcum; // cuánto queda por distribuir en meses futuros\n    rows.push({ mes: i+1, pagado: cuotasCustom[i], est: cuotasEst[i], pagadoAcum, disponible });\n  }\n\n  const { cf } = calcCF(cuotasEst, cuotasCustom);\n  const totalCuotas = cuotasCustom.reduce((a,b)=>a+b, 0);\n  return { rows, cf, totalCuotas, p, base80 };\n}\n\nfunction unitNombre(tab){\n  const pr=estado[tab].premium, h3=estado[tab].hab3;\n  if(pr&&h3) return 'Premium · 3 habitaciones';\n  if(pr) return 'Premium'; if(h3) return '3 habitaciones';\n  return 'Estándar';\n}\n\nfunction cotHTML(tab, p, totalCuotas, cf){\n  const sep=p*0.10, ent=p*0.10;\n  const hasCF = cf > UMBRAL;\n  const entregaFinal = ent + cf;\n  const total = sep + totalCuotas + entregaFinal;\n  const nombre = unitNombre(tab);\n  const cuotasEst = getCuotasEst(p);\n\n  let rows = '<div class=\"cot-row\"><div class=\"cot-label\">Precio base<\u002Fdiv><div class=\"cot-val\">'+fmt(BASE)+'<\u002Fdiv><\u002Fdiv>';\n\n  if(estado[tab].premium)\n    rows += '<div class=\"cot-row sub\"><div class=\"cot-label muted\">+ Paquete premium<\u002Fdiv><div class=\"cot-val muted\">'+fmt(PREMIUM)+'<\u002Fdiv><\u002Fdiv>';\n  if(estado[tab].hab3)\n    rows += '<div class=\"cot-row sub\"><div class=\"cot-label muted\">+ Tercera habitación<\u002Fdiv><div class=\"cot-val muted\">'+fmt(HAB3)+'<\u002Fdiv><\u002Fdiv>';\n\n  rows += '<div class=\"cot-row divider\"><div class=\"cot-label\" style=\"font-weight:500;\">Precio del inmueble<\u002Fdiv><div class=\"cot-val\" style=\"font-weight:500;\">'+fmt(p)+'<\u002Fdiv><\u002Fdiv>';\n  rows += '<div class=\"cot-row\"><div class=\"cot-label muted\">Separación — hoy (10%)<\u002Fdiv><div class=\"cot-val muted\">'+fmt(sep)+'<\u002Fdiv><\u002Fdiv>';\n\n  const cuotaLabel = tab==='est' ? '24 cuotas de '+fmt(cuotasEst[0]) : '24 cuotas (plan personalizado)';\n  rows += '<div class=\"cot-row sub\"><div class=\"cot-label muted\">'+cuotaLabel+'<\u002Fdiv><div class=\"cot-val muted\">'+fmt(totalCuotas)+'<\u002Fdiv><\u002Fdiv>';\n\n  rows += '<div class=\"cot-row sub\"><div class=\"cot-label muted\">Desembolso final — mes 25 (10%)<\u002Fdiv><div class=\"cot-val muted\">'+fmt(ent)+'<\u002Fdiv><\u002Fdiv>';\n\n  if(hasCF)\n    rows += '<div class=\"cot-row sub\"><div class=\"cot-label muted\" style=\"color:var(--warn);\">+ Costo financiero diferencial (1.8% m.v.)<\u002Fdiv><div class=\"cot-val muted\" style=\"color:var(--warn);\">'+fmt(cf)+'<\u002Fdiv><\u002Fdiv>';\n\n  rows += '<div class=\"cot-row total\"><div class=\"cot-label\">Total a pagar<\u002Fdiv><div class=\"cot-val\">'+fmt(total)+'<\u002Fdiv><\u002Fdiv>';\n\n  return '<div class=\"cot-header\"><div class=\"cot-eyebrow\">Cotización<\u002Fdiv><h2>Montañuela — '+nombre+'<\u002Fh2><\u002Fdiv><div>'+rows+'<\u002Fdiv>';\n}\n\nfunction renderEst(){\n  const p = getPrecio('est');\n  document.getElementById('cot-est').innerHTML = cotHTML('est', p, p*0.80, 0);\n}\n\nfunction renderSim(){\n  const { rows, cf, totalCuotas, p, base80 } = calcSim();\n  const hasCF = cf > UMBRAL;\n  const ent = p*0.10;\n  const entregaFinal = ent + cf;\n  const saldoGlobal = base80 - totalCuotas;\n  const haySaldoSinAsignar = saldoGlobal > UMBRAL;\n\n  // Banner global de saldo\n  const banner = document.getElementById('saldo-banner');\n  if(haySaldoSinAsignar){\n    banner.style.display = 'flex';\n    document.getElementById('saldo-val').textContent = fmt(saldoGlobal);\n  } else {\n    banner.style.display = 'none';\n  }\n\n  const tb = document.getElementById('tbody-sim');\n  tb.innerHTML = '';\n\n  rows.forEach(function(r){\n    const tr = document.createElement('tr');\n    const esBajo = r.pagado < r.est - UMBRAL;\n\n    tr.innerHTML =\n      '<td>'+r.mes+'<\u002Ftd>'+\n      '<td class=\"r\"><input class=\"cuota-input'+(esBajo?' bajo':'')+'\" type=\"text\"'+\n        ' value=\"'+fmt(r.pagado)+'\"'+\n        ' data-idx=\"'+(r.mes-1)+'\"'+\n        ' onblur=\"onCuotaEdit(this)\"'+\n        ' onfocus=\"this.value=Math.round(cuotasCustom['+(r.mes-1)+']).toString();this.select();\"'+\n        ' onkeydown=\"if(event.key===\\'Enter\\')this.blur();\"><\u002Ftd>'+\n      '<td class=\"r\" style=\"color:var(--ink-mute);\">'+fmt(r.est)+'<\u002Ftd>'+\n      '<td class=\"r\" style=\"color:var(--ink-mute);\">'+fmt(r.pagadoAcum)+'<\u002Ftd>';\n    tb.appendChild(tr);\n  });\n\n  const trEnt = document.createElement('tr');\n  trEnt.className = 'entrega-row';\n  trEnt.innerHTML =\n    '<td>Mes 25<\u002Ftd>'+\n    '<td class=\"r\" colspan=\"2\" style=\"color:'+(hasCF?'var(--warn)':'var(--ink)')+';\">'+\n      'Desembolso final'+(hasCF?' (10% + costo financiero)':' (10%)')+\n    '<\u002Ftd>'+\n    '<td class=\"r\" style=\"color:'+(hasCF?'var(--warn)':'var(--ink)')+';\">'+fmt(entregaFinal)+'<\u002Ftd>';\n  tb.appendChild(trEnt);\n\n  document.getElementById('cot-sim').innerHTML = cotHTML('sim', p, totalCuotas, cf);\n  document.getElementById('nota-sim').textContent = hasCF\n    ? 'Este plan genera un costo financiero de '+fmt(cf)+' — diferencial de valor futuro al 1.8% mensual vs. el plan estándar. Se cobra en el desembolso final.'\n    : 'Sin costo financiero. Este plan es equivalente o mejor que el estándar para Futura.';\n}\n\nfunction onCuotaEdit(input){\n  const idx = parseInt(input.dataset.idx);\n  const p = getPrecio('sim');\n  const base80 = p * 0.80;\n\n  // Cuánto ya está asignado en los otros meses\n  let asignadoOtros = 0;\n  for(let i=0; i<24; i++){\n    if(i !== idx) asignadoOtros += cuotasCustom[i];\n  }\n\n  // Tope: no puede superar lo disponible ni bajar de 0\n  const maximo = base80 - asignadoOtros;\n  let val = parseInt(input.value.replace(/[^0-9]/g,'')) || 0;\n  val = Math.max(0, Math.min(val, maximo));\n\n  cuotasCustom[idx] = val;\n  renderSim();\n}\n\nfunction resetCuotas(){ initCuotas(); renderSim(); }\n\nfunction setTab(tab){\n  document.getElementById('tab-est').classList.toggle('active', tab==='est');\n  document.getElementById('tab-sim').classList.toggle('active', tab==='sim');\n  document.getElementById('pane-est').style.display = tab==='est' ? 'block' : 'none';\n  document.getElementById('pane-sim').style.display = tab==='sim' ? 'block' : 'none';\n}\n\nrenderEst();\ninitCuotas();\nrenderSim();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
